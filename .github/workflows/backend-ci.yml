name: Backend CI

on:
  push:
    branches: [master, pharmacien, commande, livraison, medicament, utilisateur]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: |
          cd garapexpressBack
          npm ci

      - name: Run linter
        run: |
          cd garapexpressBack
          npm run lint

      - name: Build the application
        run: |
          cd garapexpressBack
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}