version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: garapexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: garapexpress
      POSTGRES_PASSWORD: ${DB_PASSWORD:-votre_mot_de_passe}
      POSTGRES_DB: garapexpress
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garapexpress"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garapexpress-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://garapexpress:${DB_PASSWORD:-votre_mot_de_passe}@db:5432/garapexpress
      JWT_SECRET: ${JWT_SECRET:-votre_secret_jwt}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: